# Non-secret Cloud Run config. Safe to commit.
#
# Everything sensitive lives in Secret Manager and is injected at deploy time
# with --set-secrets:
#
#   ANTHROPIC_API_KEY  -> anthropic-api-key
#   TWILIO_AUTH_TOKEN  -> twilio-auth-token
#   AGENT_CONTEXT      -> agent-context
#
# AGENT_CONTEXT is a secret and not a config value on purpose. The gate's whole
# security model is that a stranger cannot look those facts up — committing them
# to git would put them in every clone and every CI log, which is the same leak
# as posting them on LinkedIn. Keeping them in Secret Manager also means you can
# rotate a fact that has gone stale without touching the code.
#
# See the README for the deploy command.

MODE: "voice-agent"
OPEN_DIGITS: "ww9"
RECORD_CALLS: "true"

AGENT_MODEL: "claude-haiku-4-5"
AGENT_GREETING: "Hello?"
AGENT_MAX_TURNS: "6"
